document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ff;     /* primary action blue        */\n  --signal-d:#1f55da;\n  --pulse:#3fe0c4;      /* mint accent (used sparingly)*/\n  --paper:#f5f8fc;\n  --card:#ffffff;\n  --line:#dde6f2;\n  --line-d:rgba(140,170,220,.16);\n  --text:#0c1a35;\n  --muted:#5b6d89;\n  --muted-d:#9db2d4;\n  --disp:'Space Grotesk',sans-serif;\n  --body:'Plus Jakarta Sans',system-ui,sans-serif;\n  /* vertical rhythm */\n  --sec:104px;\n  --shadow-cta:0 12px 26px -12px rgba(47,109,255,.62);\n}\n*{margin:0;padding:0;box-sizing:border-box}\nhtml{scroll-behavior:smooth}\nbody{font-family:var(--body);color:var(--text);background:var(--paper);line-height:1.62;-webkit-font-smoothing:antialiased;overflow-x:hidden;text-rendering:optimizeLegibility}\na{color:inherit;text-decoration:none}\n:focus-visible{outline:2px solid var(--pulse);outline-offset:3px;border-radius:5px}\n.wrap{width:100%;max-width:1140px;margin:0 auto;padding:0 24px}\n.eyebrow{font-family:var(--disp);font-size:12px;font-weight:500;letter-spacing:.28em;text-transform:uppercase;color:var(--pulse)}\n.disp{font-family:var(--disp)}\n\n/* ---- buttons (action names stay consistent) ---- */\n.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;font-family:var(--disp);font-weight:600;font-size:15.5px;\n  min-height:48px;padding:0 26px;border-radius:11px;cursor:pointer;border:1.5px solid transparent;line-height:1;\n  transition:transform .16s cubic-bezier(.22,.7,.2,1),background .16s ease,border-color .16s ease,box-shadow .16s ease}\n.btn svg{width:17px;height:17px}\n.btn-primary{background:var(--signal);color:#fff}\n.btn-primary:hover{background:var(--signal-d);transform:translateY(-2px);box-shadow:var(--shadow-cta)}\n.btn-primary:active{transform:translateY(0)}\n.btn-line{background:transparent;color:var(--text);border-color:var(--line)}\n.btn-line:hover{border-color:var(--signal);color:var(--signal);transform:translateY(-2px)}\n.btn-wa{background:transparent;color:#0c1a35;border-color:rgba(63,224,196,.5)}\n.btn-wa:hover{background:rgba(63,224,196,.12);transform:translateY(-2px)}\n.on-dark .btn-line{color:#dfe9fb;border-color:var(--line-d)}\n.on-dark .btn-line:hover{border-color:var(--pulse);color:var(--pulse)}\n.on-dark .btn-wa{color:#eafff9;border-color:rgba(63,224,196,.45)}\n\n/* WhatsApp + SMS hint stack (hero, booking, final CTA) */\n.wa-stack{display:inline-flex;flex-direction:column;align-items:stretch;gap:8px}\n.wa-stack .btn{width:100%}\n.wa-hint{font-size:12.5px;line-height:1.45;text-align:center;color:rgba(91,109,137,.78)}\n.wa-hint a{color:var(--signal);font-weight:600;text-decoration:none;border-bottom:1px solid transparent;transition:border-color .15s,color .15s}\n.wa-hint a:hover{border-bottom-color:currentColor}\n.on-dark .wa-hint{color:rgba(199,213,235,.7)}\n.on-dark .wa-hint a{color:var(--pulse)}\n\n/* ---- nav ---- */\n.nav{position:sticky;top:0;z-index:50;background:rgba(9,21,41,.78);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--line-d)}\n.nav .wrap{display:flex;align-items:center;justify-content:space-between;height:68px}\n.mark{font-family:var(--disp);color:#fff;font-weight:700;font-size:18px;letter-spacing:.01em;display:flex;align-items:baseline;gap:9px;white-space:nowrap}\n.mark .slash{color:var(--pulse);font-weight:500;font-size:13px;letter-spacing:.04em}\n.nav .btn{min-height:42px;padding:0 18px;font-size:14px}\n\n/* ---- hero ---- */\n.hero{background:\n    radial-gradient(48% 60% at 76% 42%, rgba(63,224,196,.10), transparent 60%),\n    radial-gradient(50% 50% at 78% 44%, rgba(47,109,255,.16), transparent 60%),\n    linear-gradient(165deg,var(--ink),var(--ink-2));\n  color:#fff;overflow:hidden;position:relative}\n.hero .wrap{position:relative;z-index:2;display:grid;grid-template-columns:1.05fr .95fr;gap:40px;align-items:center;padding:92px 24px 40px}\n.hero h1{font-family:var(--disp);font-weight:700;font-size:clamp(37px,5.1vw,58px);line-height:1.03;letter-spacing:-1.6px;margin:22px 0 0}\n.hero h1 em{font-style:normal;color:var(--pulse)}\n.hero .sub{margin-top:22px;font-size:18px;line-height:1.6;color:#c6d6ef;max-width:520px;font-weight:400}\n.hero .sub b{color:#fff;font-weight:600}\n.micro{display:inline-flex;align-items:center;gap:9px;margin-top:24px;font-size:13px;color:var(--muted-d)}\n.micro .pin{width:7px;height:7px;border-radius:50%;background:var(--pulse);box-shadow:0 0 9px var(--pulse)}\n.hero-cta{display:flex;flex-wrap:wrap;gap:13px;margin-top:32px}\n\n/* ---- signature: convergence diagram ---- */\n.figure{position:relative}\n.figure svg{width:100%;height:auto;display:block;overflow:visible}\n.wire{stroke:rgba(120,170,255,.32);stroke-width:1.4;fill:none;\n  stroke-dasharray:300;stroke-dashoffset:300;animation:draw 1s ease forwards}\n.wire:nth-child(1){animation-delay:.05s}.wire:nth-child(2){animation-delay:.12s}\n.wire:nth-child(3){animation-delay:.19s}.wire:nth-child(4){animation-delay:.26s}\n.wire:nth-child(5){animation-delay:.33s}.wire:nth-child(6){animation-delay:.40s}\n.flow{stroke:var(--signal);stroke-width:1.8;fill:none;stroke-linecap:round;\n  stroke-dasharray:5 16;opacity:0;animation:fadeflow .5s ease 1.05s forwards, flow 1.4s linear 1.05s infinite}\n@keyframes flow{to{stroke-dashoffset:-21}}\n@keyframes draw{to{stroke-dashoffset:0}}\n@keyframes fadeflow{to{opacity:1}}\n.node{fill:var(--pulse)}\n.node-ring{fill:none;stroke:rgba(63,224,196,.4);stroke-width:1}\n.nlabel{font-family:var(--disp);font-size:16px;font-weight:600;fill:#e3edff;letter-spacing:.01em}\n.hub-glow{animation:breathe 4s ease-in-out infinite;transform-origin:388px 240px}\n@keyframes breathe{0%,100%{opacity:.45}50%{opacity:.85}}\n.hub-cap{font-family:var(--disp);font-size:10.5px;font-weight:700;letter-spacing:.28em;fill:var(--pulse);text-transform:uppercase}\n.hub-mono{font-family:var(--disp);font-size:19px;font-weight:700;fill:#fff;letter-spacing:.01em}\n.orbit{fill:none;stroke:rgba(63,224,196,.18);stroke-width:1}\n.orbit-dash{fill:none;stroke:rgba(63,224,196,.34);stroke-width:1.2;stroke-dasharray:2 6}\n\n/* ---- proof strip (data, not decoration) ---- */\n.proof{position:relative;z-index:2;border-top:1px solid var(--line-d)}\n.proof .wrap{display:grid;grid-template-columns:repeat(4,1fr);padding:0}\n.pcell{padding:26px 20px;text-align:center;border-right:1px solid var(--line-d)}\n.pcell:last-child{border-right:none}\n.pcell .n{font-family:var(--disp);font-size:28px;font-weight:600;color:#fff;line-height:1;letter-spacing:-.4px}\n.pcell .n .acc{color:var(--pulse)}\n.pcell .n .cu{color:#fff}\n.pcell .l{font-size:11px;color:var(--muted-d);letter-spacing:.05em;margin-top:9px;text-transform:uppercase}\n\n/* ---- generic section ---- */\n.sec{padding:var(--sec) 0}\n.sec.mist{background:var(--paper)}\n.sec.white{background:#fff}\n.shead{max-width:640px;margin-bottom:54px}\n.shead.center{margin-left:auto;margin-right:auto;text-align:center}\n.shead .eyebrow{color:var(--signal)}\n.shead h2{font-family:var(--disp);font-size:clamp(28px,3.5vw,38px);font-weight:600;letter-spacing:-1px;line-height:1.08;margin:13px 0 12px}\n.shead p{color:var(--muted);font-size:17px;line-height:1.6;text-wrap:pretty}\n\n/* ---- services: the channels that converge ---- */\n.svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid var(--line);border-left:1px solid var(--line)}\n.svc{position:relative;padding:32px 30px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);background:#fff;\n  transition:background .18s ease,transform .18s cubic-bezier(.22,.7,.2,1)}\n.svc::before{content:\"\";position:absolute;left:-1px;top:0;bottom:0;width:3px;background:var(--signal);\n  transform:scaleY(0);transform-origin:top;transition:transform .24s cubic-bezier(.22,.7,.2,1)}\n.svc:nth-child(3n+2)::before{background:var(--pulse)}\n.svc:hover{background:#fafcff}\n.svc:hover::before{transform:scaleY(1)}\n.svc .tick{width:30px;height:3px;border-radius:2px;background:var(--signal);margin-bottom:20px;transition:width .24s ease}\n.svc:nth-child(3n+2) .tick{background:var(--pulse)}\n.svc:hover .tick{width:42px}\n.svc h3{font-family:var(--disp);font-size:18px;font-weight:600;margin-bottom:9px;display:flex;align-items:center;gap:10px}\n.svc h3 svg{width:20px;height:20px;color:var(--signal)}\n.svc p{font-size:14.5px;line-height:1.58;color:var(--muted)}\n\n/* ---- why ---- */\n.why{display:grid;grid-template-columns:repeat(2,1fr);gap:0 48px;max-width:980px}\n.reason{display:flex;gap:16px;align-items:flex-start;padding:20px 0;border-bottom:1px solid var(--line)}\n.reason .mk{flex:none;width:16px;height:3px;border-radius:2px;background:var(--pulse);margin-top:13px}\n.reason h3{font-family:var(--disp);font-size:16.5px;font-weight:600;margin-bottom:5px}\n.reason p{font-size:14.5px;line-height:1.55;color:var(--muted)}\n\n/* ---- divider: converging lines (structural signature) ---- */\n.converge{display:block;margin:0 auto;width:120px;height:26px;opacity:.8}\n\n/* ---- offer (the one bright moment) ---- */\n.offer{background:linear-gradient(160deg,var(--ink),var(--ink-2));color:#fff;position:relative;overflow:hidden}\n.offer .glow{position:absolute;right:-120px;top:-80px;width:420px;height:420px;\n  background:radial-gradient(circle,rgba(63,224,196,.18),transparent 68%);pointer-events:none}\n.offer .wrap{position:relative;z-index:2;display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center}\n.offer h2{font-family:var(--disp);font-size:clamp(28px,3.5vw,39px);font-weight:600;line-height:1.1;letter-spacing:-.9px}\n.offer h2 em{font-style:normal;color:var(--pulse)}\n.offer .lede{color:#c6d6ef;margin-top:16px;font-size:17px;line-height:1.6;text-wrap:pretty}\n.olist{list-style:none;margin-top:6px}\n.olist li{display:flex;gap:14px;align-items:flex-start;padding:15px 0;border-bottom:1px solid var(--line-d);font-size:15.5px;line-height:1.5;color:#e6eefb}\n.olist li:last-child{border-bottom:none}\n.olist svg{width:20px;height:20px;color:var(--pulse);flex:none;margin-top:2px}\n\n/* ---- testimonials (placeholder) ---- */\n.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}\n.t{background:#fff;border:1px solid var(--line);border-radius:16px;padding:26px;box-shadow:0 18px 40px -28px rgba(13,33,80,.28)}\n.t .stars{color:var(--pulse);letter-spacing:3px;font-size:15px}\n.t p{font-size:14.5px;line-height:1.6;color:var(--muted);margin:14px 0 18px}\n.t .who{font-family:var(--disp);font-size:14px;font-weight:600}\n.t .who span{display:block;font-family:var(--body);font-size:12.5px;color:var(--muted);font-weight:400;margin-top:2px}\n.ph{text-align:center;color:var(--muted);font-size:13px;margin-top:22px}\n\n/* ---- booking ---- */\n.book .wrap{display:grid;grid-template-columns:.92fr 1.08fr;gap:52px;align-items:start}\n.book h2{font-family:var(--disp);font-size:clamp(26px,3.3vw,35px);font-weight:600;letter-spacing:-.8px;line-height:1.1}\n.book .lede{color:var(--muted);margin:16px 0 26px;font-size:16px;line-height:1.6}\n.book .alt{padding-top:24px;border-top:1px solid var(--line)}\n.book .alt b{font-family:var(--disp)}\n.book .alt .row{display:flex;gap:11px;flex-wrap:wrap;margin-top:15px}\n.formcard{background:#fff;border:1px solid var(--line);border-radius:18px;padding:32px;box-shadow:0 28px 56px -30px rgba(13,33,80,.34)}\n.field{margin-bottom:16px}\n.field label{display:block;font-size:13px;font-weight:500;margin-bottom:7px;font-family:var(--disp)}\n.field input,.field textarea{width:100%;font-family:var(--body);font-size:15px;padding:13px 15px;min-height:48px;\n  border:1.5px solid var(--line);border-radius:11px;background:var(--paper);color:var(--text);transition:border-color .16s,background .16s,box-shadow .16s}\n.field input:focus,.field textarea:focus{outline:none;border-color:var(--signal);background:#fff;box-shadow:0 0 0 4px rgba(47,109,255,.1)}\n.field textarea{resize:vertical;min-height:88px}\n.formcard .btn-primary{width:100%;margin-top:6px}\n.fnote{font-size:12px;color:var(--muted);text-align:center;margin-top:13px}\n.fok{display:none;text-align:center;padding:24px 8px}\n.fok .ic{width:56px;height:56px;border-radius:50%;background:rgba(63,224,196,.16);display:flex;align-items:center;justify-content:center;margin:0 auto 14px}\n.fok .ic svg{width:28px;height:28px;color:#15b394}\n.fok h3{font-family:var(--disp);font-size:19px;margin-bottom:7px}.fok p{color:var(--muted);font-size:14.5px;line-height:1.55}\n\n/* ---- faq ---- */\n.faq{max-width:800px}\n.qa{border-bottom:1px solid var(--line)}\n.qa button{width:100%;text-align:left;background:none;border:none;font-family:var(--disp);cursor:pointer;\n  padding:22px 4px;font-size:16.5px;font-weight:500;color:var(--text);display:flex;justify-content:space-between;align-items:center;gap:16px;transition:color .15s}\n.qa button:hover{color:var(--signal)}\n.qa button .pm{flex:none;width:22px;height:22px;color:var(--signal);font-size:22px;line-height:1;transition:transform .24s cubic-bezier(.22,.7,.2,1);font-family:var(--body)}\n.qa.open button .pm{transform:rotate(45deg)}\n.qa .ans{max-height:0;overflow:hidden;transition:max-height .28s ease}\n.qa .ans p{padding:0 4px 22px;color:var(--muted);font-size:15px;line-height:1.6;max-width:680px}\n\n/* ---- final / footer ---- */\n.final{background:linear-gradient(165deg,var(--ink),var(--ink-2));color:#fff;text-align:center}\n.final .converge{margin-bottom:26px}\n.final h2{font-family:var(--disp);font-size:clamp(31px,4.5vw,52px);font-weight:700;letter-spacing:-1.4px;line-height:1.04}\n.final h2 em{font-style:normal;color:var(--pulse)}\n.final p{color:#c6d6ef;margin:18px auto 32px;max-width:500px;font-size:17px;line-height:1.6}\n.final .row{display:flex;gap:13px;justify-content:center;flex-wrap:wrap}\n.foot{background:var(--ink);color:var(--muted-d);padding:36px 0;border-top:1px solid var(--line-d)}\n.foot .wrap{display:flex;flex-wrap:wrap;gap:16px;align-items:center;justify-content:space-between}\n.foot .links{display:flex;gap:22px;flex-wrap:wrap;font-size:14px}\n.foot .links a{display:inline-flex;align-items:center;gap:8px;transition:color .15s}\n.foot .links a:hover{color:#fff}\n.foot .links svg{width:15px;height:15px;color:var(--pulse)}\n.foot .copy{font-size:12.5px;color:#62789c}\n\n/* ---- mobile sticky ---- */\n.mcta{position:fixed;left:0;right:0;bottom:0;z-index:60;display:none;gap:10px;padding:11px 14px;\n  background:rgba(9,21,41,.96);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-top:1px solid var(--line-d)}\n.mcta .btn{flex:1;font-size:14.5px;min-height:48px}\n\n/* ========== motion: hero entrance + scroll reveal ==========\n   Content is visible by DEFAULT. The hidden-then-animate state only\n   applies once the inline head script adds html.anim (after confirming\n   reduced-motion is not requested) — so a partial load never hides copy. */\n@media (prefers-reduced-motion: no-preference){\n  html.anim .anim-up{opacity:0;transform:translateY(18px);animation:heroUp .72s cubic-bezier(.22,.7,.2,1) both}\n  html.anim .anim-fig{opacity:0;animation:figIn .9s ease .18s both}\n  html.anim .d1{animation-delay:.10s}html.anim .d2{animation-delay:.18s}html.anim .d3{animation-delay:.28s}html.anim .d4{animation-delay:.38s}html.anim .d5{animation-delay:.46s}\n  html.anim .reveal{opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s cubic-bezier(.22,.7,.2,1)}\n  html.anim .reveal.in{opacity:1;transform:none}\n  /* services: keep the cell as one unit, but let the subtitle trail the title in */\n  html.anim .svc.reveal{opacity:1;transform:none;transition:none}\n  html.anim .svc .tick,\n  html.anim .svc h3,\n  html.anim .svc p{opacity:0;transform:translateY(9px);\n    transition:opacity .5s ease,transform .5s cubic-bezier(.22,.7,.2,1),width .24s ease}\n  html.anim .svc.in .tick{opacity:1;transform:none;transition-delay:.02s}\n  html.anim .svc.in h3{opacity:1;transform:none;transition-delay:.10s}\n  html.anim .svc.in p{opacity:1;transform:none;transition-delay:.30s}\n}\n@keyframes heroUp{to{opacity:1;transform:none}}\n@keyframes figIn{from{opacity:0;transform:translateY(12px) scale(. nObserver' in window){\n    var io=new IntersectionObserver(function(es){es.forEach(function(e){\n      if(e.isIntersecting){run(e.target);io.unobserve(e.target);}});},{threshold:.6});\n    cu.forEach(function(el){io.observe(el);});\n  }else{cu.forEach(run);}\n})();\n/* ===== scroll reveal (4th motion pattern) — restrained, section-level ===== */\n(function(){\n  var reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n  var els=document.querySelectorAll('.reveal');\n  if(reduce || !('IntersectionObserver' in window)){\n    els.forEach(function(el){el.classList.add('in');});return;\n  }\n  var io=new IntersectionObserver(function(entries){\n    entries.forEach(function(e){\n      if(!e.isIntersecting)return;\n      var el=e.target;\n      /* gentle stagger for siblings inside the same grid/list */\n      var sibs=el.parentElement?el.parentElement.querySelectorAll(':scope > .reveal'):[el];\n      var idx=Array.prototype.indexOf.call(sibs,el);\n      el.style.transitionDelay=(idx>0?Math.min(idx,5)*0.06:0)+'s';\n      el.classList.add('in');\n      io.unobserve(el);\n    });\n  },{threshold:.16,rootMargin:'0px 0px -8% 0px'});\n  els.forEach(function(el){io.observe(el);});\n})();\ndocument.getElementById('yr').textContent=new Date().getFullYear();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
